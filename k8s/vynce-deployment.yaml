apiVersion: apps/v1
kind: Deployment
metadata:
  name: vynce-web
  labels:
    app: vynce-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vynce-web
  template:
    metadata:
      labels:
        app: vynce-web
    spec:
      containers:
        - name: vynce
          image: vynce:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: vynce-configmap
                  key: host
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: vynce-configmap
                  key: port
            - name: MAX_ROOM_SIZE
              valueFrom:
                configMapKeyRef:
                  name: vynce-configmap
                  key: max-room-size
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vynce-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vynce-secrets
                  key: jwt-secret
            - name: JAMENDO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: vynce-secrets
                  key: jamendo-client-id
          ports:
            - containerPort: 8000
              name: http
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vynce-web
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: vynce-web
