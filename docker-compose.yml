version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://vynce:vyncepassword@db:5432/vyncedb
      - JWT_SECRET=change-this-in-production-123456
      - JAMENDO_CLIENT_ID=your_client_id_here
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=vynce
      - POSTGRES_PASSWORD=vyncepassword
      - POSTGRES_DB=vyncedb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vynce -d vyncedb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
